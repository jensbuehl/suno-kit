<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNO Copilot</title>
    <style>
        :root {
            

--bg-primary: #1E1E1E;
--bg-secondary: #333333;
--bg-tertiary: #444444;
--accent-primary: #E03C31;
--accent-secondary: #E0DBD0;
--text-primary: #FAFAFA;
--text-secondary: #DADADA;
--text-muted: #B5B5B5;
--border-color: #444444;


        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 650px;
            height: 600px; /* Increased height so bottom buttons and border are visible */
            overflow: hidden !important;
        }
        
        body {
            width: 650px;
            height: 600px; /* Increased height so bottom buttons and border are visible */
            overflow: hidden !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 0;
            margin: 0;
            position: relative;
        }



        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 650px;
            height: 600px; /* Increased height so bottom buttons and border are visible */
            padding: 20px;
            background: var(--bg-primary);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden !important;
            z-index: 1;
        }

        /* Close Button */
        .close-button {
            position: absolute;
            top: 12px;
            left: 20px;
            display: flex;
            gap: 4px;
            background: var(--bg-tertiary);
            border-radius: 18px;
            padding: 3px;
            border: 1px solid var(--border-color);
            z-index: 10;
        }

        .close-btn {
            padding: 5px 10px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(186, 43, 30, 0.1);
            border-color: var(--accent-primary);
        }

        /* Language Switcher */
        .language-switcher {
            position: absolute;
            top: 12px;
            right: 20px;
            display: flex;
            gap: 4px;
            background: var(--bg-tertiary);
            border-radius: 18px;
            padding: 3px;
            border: 1px solid var(--border-color);
            z-index: 10;
        }

        .lang-btn {
            padding: 5px 10px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .lang-btn:hover:not(.active) {
            color: var(--text-primary);
            border-color: var(--accent-primary);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 10px;
            padding-top: 5px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            background: var(--accent-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 400;
        }

        .token-path {
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
            word-break: normal;
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .token-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin: 0 0 8px;
        }

        .token-controls label {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .token-controls select {
            flex: 0 0 220px;
            max-width: 220px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 11px;
            outline: none;
        }

        /* Make token-path visually match the select control */
        .token-controls .token-path {
            display: flex;
            align-items: center;
            height: 34px; /* match select visual height */
            padding: 6px 10px;
            border-radius: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 11px;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .token-controls select:focus {
            border-color: var(--accent-primary);
        }

        /* Options Grid */
        .options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .option-button {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-primary);
            font-size: 11px;
            text-align: left;
            gap: 8px;
        }

        .option-button:hover {
            background: rgba(186, 43, 30, 0.1);
            border-color: var(--accent-primary);
        }

        .option-button[data-active="true"] {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .option-icon {
            font-size: 12px;
            font-weight: 600;
            opacity: 0.8;
            min-width: 20px;
            text-align: center;
        }

        .option-text {
            flex: 1;
        }

        /* Textarea Container */
        .textarea-wrapper {
            flex: 1;
            min-height: 320px;
            max-height: 380px;
            margin-bottom: 8px;
            position: relative;
        }

        /* Textarea */
        textarea {
            width: 100%;
            height: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.4;
            resize: none;
            transition: border-color 0.3s ease;
            overflow-y: auto;
            overflow-x: hidden;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        /* Custom scrollbar for textarea */
        textarea::-webkit-scrollbar {
            width: 6px;
        }

        textarea::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }

        textarea::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 3px;
        }

        textarea::-webkit-scrollbar-thumb:hover {
            background: var(--accent-secondary);
        }



        /* Buttons Container */
        .buttons-container {
            margin-top: auto; /* Push to bottom */
            margin-bottom: 0; /* Ensure consistent bottom spacing matching container padding */
        }

        /* Buttons */
        .button-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .button-group.secondary {
            grid-template-columns: repeat(3, 1fr);
            margin-bottom: 0; /* Remove bottom margin for last button group to match container padding */
        }

        button {
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            line-height: 1;
        }

        button:active {
            transform: translateY(1px);
        }

        button .icon {
            font-size: 14px;
        }

        button[disabled] {
            background: var(--bg-tertiary) !important;
            color: var(--text-muted) !important;
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Primary action buttons (top row) */
        .button-group button {
            background-color: var(--accent-secondary);
            color: var(--bg-primary);
        }

        .button-group button:hover:not([disabled]) {
            background-color: var(--accent-primary);
            color: white;
        }

        /* Secondary action buttons (bottom row) */
        .button-group.secondary button {
            background-color: var(--accent-secondary);
            color: var(--bg-primary);
            font-size: 12px;
            padding: 10px;
        }

        .button-group.secondary button:hover:not([disabled]) {
            background-color: var(--accent-primary);
            color: white;
        }

        button .icon {
            font-size: 13px;
        }

        /* Ensure no scrollbars anywhere */
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
        
        /* Only show scrollbar in textarea */
        textarea::-webkit-scrollbar {
            width: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="close-button">
        <button class="close-btn" id="closeButton">✕</button>
    </div>
    <div class="language-switcher">
        <button class="lang-btn active" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>

    <div class="header">
        <h1 data-i18n="title">SUNO Copilot</h1>
        <p class="subtitle" data-i18n="subtitle">LRC-Inhalt wurde automatisch geladen und kann bearbeitet werden</p>
    </div>

    <div class="token-controls">
        <label for="tokenPathSelect" data-i18n="token_path_label">Token Erkennung</label>
        <select id="tokenPathSelect">
            <option value="auto">Auto</option>
        </select>
        <div class="token-path" id="tokenPathDisplay">Konnte kein Token finden</div>
    </div>

    <div class="options">
        <button class="option-button" id="removePunct" data-active="true">
            <span class="option-icon">Aa</span>
            <span class="option-text" data-i18n="remove_punctuation">Satzzeichen Enfernen</span>
        </button>
        <button class="option-button" id="toUpper" data-active="false">
            <span class="option-icon">A</span>
            <span class="option-text" data-i18n="to_upper">ALLES GROSS</span>
        </button>
        <button class="option-button" id="toLower" data-active="false">
            <span class="option-icon">a</span>
            <span class="option-text" data-i18n="to_lower">alles klein</span>
        </button>
    </div>

    <div class="textarea-wrapper">
        <textarea id="output" data-i18n-placeholder="placeholder" placeholder="Verarbeite LRC-Inhalt..."></textarea>
    </div>

    <div class="buttons-container">
        <div class="button-group">
            <button id="copyButton">
                <span class="icon">📋</span>
                <span data-i18n="copy_clipboard">Kopieren</span>
            </button>
            <button id="downloadButton">
                <span class="icon">💾</span>
                <span data-i18n="download_file">Download</span>
            </button>
        </div>
        <div class="button-group secondary">
            <button id="downloadMp3Button" disabled>
                <span class="icon">🎵</span>
                <span data-i18n="download_mp3">Audio</span>
            </button>
            <button id="downloadCoverButton" disabled>
                <span class="icon">🖼️</span>
                <span data-i18n="download_cover">Cover</span>
            </button>
            <button id="downloadVideoButton" disabled>
                <span class="icon">🎬</span>
                <span data-i18n="download_video">Video</span>
            </button>
        </div>
    </div>
</div>

<script src="popup.js"></script>

</body>
</html>
